<html lang="he" dir="rtl">
<head>

<title>ויטנאם 2026 🌏</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --hanoi:#1B6B5E;--sapa:#6B3FA0;--hagiang:#C05621;
  --tamcoc:#2F855A;--halong:#2B6CB0;--hoian:#B7791F;--bus:#718096;
  --bg:#f0f4f8;--card:#fff;--text:#1a202c;--muted:#718096;
  --nav-h:64px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;direction:rtl;background:var(--bg);color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100%;overflow:hidden}
.screen{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h) + 8px)}

/* Bottom Nav */
.nav{position:fixed;bottom:0;right:0;left:0;height:var(--nav-h);
  background:#fff;border-top:1px solid #e2e8f0;
  display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit;
  color:var(--muted);font-size:.68rem;font-weight:500;transition:color .15s;padding:6px 0}
.nav-btn.active{color:var(--primary,#1B6B5E)}
.nav-btn .icon{font-size:1.4rem;line-height:1}

/* Calendar */
.cal-header{padding:20px 16px 12px;background:linear-gradient(135deg,#1B6B5E,#2d9b87);color:#fff}
.cal-header h1{font-size:1.4rem;font-weight:700}
.cal-header p{font-size:.85rem;opacity:.85;margin-top:3px}
.days-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.day-card{border-radius:14px;overflow:hidden;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .1s,box-shadow .1s;background:#fff}
.day-card:active{transform:scale(.97)}
.day-card-top{padding:10px 12px 8px;color:#fff}
.day-card-top .day-num{font-size:1.5rem;font-weight:800;line-height:1}
.day-card-top .day-date{font-size:.72rem;opacity:.85;margin-top:1px}
.day-card-bottom{padding:8px 12px 10px}
.day-card-bottom .day-title{font-size:.78rem;font-weight:600;color:#1a202c;line-height:1.3}
.day-card.today .day-card-top::after{content:'היום';position:absolute;top:6px;left:8px;
  background:rgba(255,255,255,.25);border-radius:8px;padding:2px 7px;font-size:.65rem;font-weight:700}
.day-card-top{position:relative}

/* Day View */
.day-view{display:flex;flex-direction:column}
.day-hero{padding:20px 16px 16px;color:#fff;position:relative}
.day-hero-back{background:rgba(255,255,255,.2);border:none;border-radius:8px;
  padding:6px 12px;color:#fff;font-family:inherit;font-size:.9rem;cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:5px}
.day-hero h2{font-size:1.15rem;font-weight:700;margin-top:2px}
.day-hero .day-meta{font-size:.75rem;opacity:.8;margin-bottom:2px}
.day-body{padding:12px 14px;display:flex;flex-direction:column;gap:12px}

/* Cards */
.section-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.section-card-header{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid #f0f4f8}
.section-card-header .s-icon{font-size:1.1rem}
.section-card-header h3{font-size:.95rem;font-weight:700;flex:1}
.section-card-body{padding:12px 14px}
.hotel-name{font-size:1rem;font-weight:700;color:#1a202c;margin-bottom:4px}
.hotel-meta{font-size:.82rem;color:var(--muted);line-height:1.7}
.hotel-meta a{color:inherit;text-decoration:none}
.hotel-booking{display:inline-block;margin-top:8px;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:600;background:#edf2f7;color:#4a5568}

/* Schedule */
.schedule-list{display:flex;flex-direction:column;gap:0}
.schedule-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #f7f8fa;align-items:flex-start}
.schedule-item:last-child{border:none;padding-bottom:0}
.sched-time{font-size:.78rem;font-weight:700;color:var(--region-color,#1B6B5E);min-width:60px;padding-top:1px}
.sched-text{font-size:.85rem;color:#2d3748;line-height:1.5;flex:1}
.sched-edit-btn{background:none;border:none;cursor:pointer;font-size:.95rem;padding:4px 8px;
  color:var(--muted);border-radius:6px;margin-right:auto}
.sched-secondary{font-size:.74rem;color:var(--muted);margin-top:3px;display:flex;flex-direction:column;gap:2px}
.sched-edit-item{padding:10px 0;border-bottom:1px solid #f0f4f8;display:flex;flex-direction:column;gap:6px}
.sched-edit-item:last-child{border:none}
.sched-edit-row{display:flex;gap:8px;align-items:flex-start}
.sched-edit-time{width:72px;flex-shrink:0;border:1.5px solid #e2e8f0;border-radius:8px;
  padding:7px 6px;font-family:inherit;font-size:.8rem;font-weight:700;text-align:center;
  color:var(--region-color,#1B6B5E)}
.sched-edit-time:focus,.sched-edit-desc:focus,.sched-edit-aux:focus{outline:none;border-color:var(--region-color,#1B6B5E)}
.sched-edit-desc{flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 10px;
  font-family:inherit;font-size:.84rem;line-height:1.5;resize:none;min-height:38px;overflow:hidden}
.sched-edit-aux{border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;
  font-family:inherit;font-size:.79rem;width:100%;box-sizing:border-box}
.sched-aux-label{font-size:.71rem;color:var(--muted);font-weight:600;margin-top:2px}
.sched-row-btns{display:flex;gap:4px;flex-shrink:0}
.sched-row-btn{background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:7px;
  width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:#4a5568}
.sched-row-btn.del{color:#e53e3e;border-color:#fed7d7;background:#fff5f5}
.sched-add-btn{width:100%;margin-top:8px;padding:10px;border-radius:10px;
  border:2px dashed #e2e8f0;background:#f7f8fa;font-family:inherit;font-size:.85rem;
  font-weight:600;color:var(--muted);cursor:pointer}

/* Tips & Food */
.tip-list{display:flex;flex-direction:column;gap:7px}
.tip-item{display:flex;gap:8px;align-items:flex-start;font-size:.84rem;line-height:1.5;color:#2d3748}
.tip-item::before{content:'💡';flex-shrink:0;margin-top:1px}
.food-item{display:flex;gap:8px;font-size:.84rem;line-height:1.5;padding:5px 0;border-bottom:1px solid #f7f8fa;color:#2d3748}
.food-item:last-child{border:none}

/* Logistics */
.log-item{display:flex;flex-direction:column;gap:2px;padding:7px 0;border-bottom:1px solid #f7f8fa}
.log-item:last-child{border:none;padding-bottom:0}
.log-label{font-size:.75rem;color:var(--muted);font-weight:600}
.log-value{font-size:.86rem;color:#2d3748;font-weight:500}

/* Summary */
.summary-textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;
  font-family:inherit;font-size:.88rem;line-height:1.6;color:#2d3748;resize:none;min-height:100px;
  direction:rtl;transition:border-color .15s}
.summary-textarea:focus{outline:none;border-color:#4a90d9}
.summary-hint{font-size:.75rem;color:var(--muted);margin-top:6px;text-align:center}
.sync-status{font-size:.72rem;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}
.sync-ok{background:#c6f6d5;color:#22543d}
.sync-saving{background:#fef3c7;color:#744210}

/* Phrases */
.phrases-header{padding:18px 16px 12px;background:linear-gradient(135deg,#2B6CB0,#4a90d9);color:#fff}
.phrases-header h1{font-size:1.3rem;font-weight:700}
.cat-tab-bar{display:flex;gap:6px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none}
.cat-tab-bar::-webkit-scrollbar{display:none}
.cat-tab{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;
  background:#fff;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.cat-tab.active{background:#2B6CB0;border-color:#2B6CB0;color:#fff}
.phrase-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.phrase-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.phrase-he{font-size:.92rem;font-weight:700;color:#1a202c;margin-bottom:4px}
.phrase-vn{font-size:.88rem;color:#2B6CB0;font-weight:600;direction:ltr;text-align:left}
.phrase-pronounce{font-size:.78rem;color:var(--muted);margin-top:3px;direction:ltr;text-align:left}

/* Currency */
.curr-header{padding:18px 16px 12px;background:linear-gradient(135deg,#B7791F,#d4930a);color:#fff}
.curr-body{padding:16px}
.curr-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}
.curr-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.curr-label{font-size:.8rem;font-weight:700;color:var(--muted);width:50px;text-align:center}
.curr-input{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;
  font-size:1.1rem;font-weight:700;font-family:inherit;text-align:center;transition:border-color .15s}
.curr-input:focus{outline:none;border-color:#B7791F}
.curr-result-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4f8}
.curr-result-row:last-child{border:none}
.curr-res-label{font-size:.82rem;color:var(--muted)}
.curr-res-val{font-size:1.05rem;font-weight:700;color:#2d3748}
.rate-info{font-size:.78rem;color:var(--muted);text-align:center;margin-top:8px}
.rate-edit{font-size:.8rem;padding:6px 12px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f7f8fa;cursor:pointer;font-family:inherit}

/* Contacts */
.contacts-header{padding:18px 16px 12px;background:linear-gradient(135deg,#6B3FA0,#9b59b6);color:#fff}
.contact-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin:0 14px 12px}
.contact-card-top{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid #f0f4f8}
.contact-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.contact-name{font-weight:700;font-size:.95rem}
.contact-role{font-size:.78rem;color:var(--muted);margin-top:2px}
.contact-links{display:flex;gap:0}
.contact-link{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px;font-size:.82rem;font-weight:600;text-decoration:none;color:#2d3748;
  border-left:1px solid #f0f4f8;transition:background .15s}
.contact-link:first-child{border:none}
.contact-link:active{background:#f7f8fa}

/* Info */
.info-header{padding:18px 16px 12px;background:linear-gradient(135deg,#2F855A,#48bb78);color:#fff}
.info-section{margin:12px 14px 0}
.info-section h3{font-size:.95rem;font-weight:700;color:#1a202c;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.info-item{font-size:.84rem;color:#2d3748;line-height:1.6;padding:5px 0;border-bottom:1px solid #f7f8fa;display:flex;gap:8px;align-items:flex-start}
.info-item:last-child{border:none}
.info-bullet{color:var(--muted);flex-shrink:0}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gallery-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}
.gallery-add{width:100%;aspect-ratio:1;border-radius:8px;border:2px dashed #e2e8f0;
  background:#f7f8fa;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-direction:column;gap:4px;color:var(--muted);font-size:.78rem;font-weight:600}
.gallery-add .add-icon{font-size:1.6rem}

/* Setup screen */
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 24px;background:linear-gradient(135deg,#1B6B5E 0%,#2B6CB0 100%)}
.setup-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
.setup-card h1{font-size:1.5rem;font-weight:800;margin-bottom:6px;color:#1a202c}
.setup-card p{font-size:.88rem;color:var(--muted);margin-bottom:24px;line-height:1.5}
.setup-input{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:12px 16px;
  font-family:inherit;font-size:1.2rem;font-weight:700;text-align:center;letter-spacing:4px;
  direction:ltr;transition:border-color .15s;margin-bottom:12px}
.setup-input:focus{outline:none;border-color:#1B6B5E}
.setup-btn{width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#1B6B5E,#2B6CB0);color:#fff;
  font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer}
.setup-hint{font-size:.78rem;color:var(--muted);margin-top:16px}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox img{max-width:95vw;max-height:80vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.2);
  border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:1.2rem;cursor:pointer}

/* Utils */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.73rem;font-weight:700}
.mt8{margin-top:8px}
.no-hotel{color:var(--muted);font-size:.85rem;font-style:italic;padding:4px 0}

/* Weather */
.weather-main{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.weather-big-icon{font-size:2.4rem;line-height:1;flex-shrink:0}
.weather-tmax{font-size:1.45rem;font-weight:800;color:#1a202c}
.weather-tmin{font-size:.92rem;color:var(--muted);font-weight:600}
.weather-wdesc{font-size:.83rem;color:#2d3748;margin-top:2px}
.weather-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.weather-chip{background:#f0f4f8;border-radius:8px;padding:4px 10px;font-size:.78rem;color:#4a5568;font-weight:600}
.clothes-header{font-size:.82rem;font-weight:700;color:#2d3748;margin:10px 0 6px;padding-top:10px;border-top:1px solid #f0f4f8}
.clothes-item{font-size:.82rem;line-height:1.6;color:#2d3748;padding:1px 0}
.weather-loading{text-align:center;color:var(--muted);font-size:.85rem;padding:10px 0}
</style>
</head>

function todayDayN() {
  const today = new Date();
  const start = new Date('2026-07-15');
  const diff = Math.floor((today - start) / 86400000) + 1;
  return (diff >= 1 && diff <= 17) ? diff : null;
}

function getClothingTips(weather, day) {
  const tips = [];
  const {tmax, precip, wcode, wind} = weather;
  const txt = [...day.schedule.map(s=>s.d), ...(day.tips||[])].join(' ');
  const has = ws => ws.some(w => txt.includes(w));

  const isTrekking = has(['טרקינג','הליכה','מעבר','אופנוע','לופ','טיול רגלי']);
  const isBoat     = has(['שייט','ספינה','סירה','קיאק','הלונג','סיפון','שיט']);
  const isTemple   = has(['מקדש','ארמון','מנזר']);
  const isMountain = ['sapa','hagiang'].includes(day.region);
  const rainCodes  = [51,53,55,61,63,65,80,81,82,95,96,99];
  const isRain     = precip > 5 || rainCodes.includes(wcode);
  const isHeavy    = precip > 20 || [65,82,95,96,99].includes(wcode);

  if      (tmax >= 35) tips.push('🌡️ חום קיצוני — בגדים מנדפי זיעה, צבעים בהירים בלבד');
  else if (tmax >= 32) tips.push('☀️ חם ולח — כותנה קלה ורפויה, לא סינתטי');
  else if (tmax >= 27) tips.push('🌤️ חם ונעים — בגדים קלים, שרוול קצר');
  else                 tips.push('🧥 נעים — קחו ג\'קט קל לערב');

  if (isHeavy)    tips.push('🌧️ גשם כבד צפוי — פונצ\'ו / מעיל גשם חובה!');
  else if(isRain) tips.push('🌦️ יתכן גשם — קחו מטרייה קומפקטית');

  if (!isHeavy)  tips.push('🌞 קרם שמש SPF 50+ — מרחו מחדש כל שעתיים');
  if (isTrekking) tips.push('👟 נעלי הליכה עם אחיזה — הדרכים לחות ומחליקות');
  if (isBoat)     tips.push('👒 כובע רחב שוליים — השמש על הסיפון חזקה מאוד');
  if (isTemple)   tips.push('👗 כתפיים + ברכיים מכוסות — חובה למקדשים ואתרים');
  if (isMountain) tips.push('🧥 ג\'קט לפסגות — טמפ\' יורדת 6-8 מעלות בגובה');
  if (wind > 30)  tips.push('💨 רוח חזקה — היזהרו עם כובעים וחפצים קלים');

  return tips;
}

function useSyncedData(tripCode) {
  const [summaries, setSummaries] = useState({});
  const [syncStatus, setSyncStatus] = useState({});

  useEffect(() => {
    if (!FB_READY || !tripCode) return;
    const ref = db.collection('vietnam_trips').doc(tripCode).collection('data');
    const unsub = ref.onSnapshot(
      snap => {
        const data = {};
        snap.forEach(doc => { data[doc.id] = doc.data(); });
        setSummaries(data);
      },
      err => console.error('Summaries sync error:', err.code, err.message)
    );
    return unsub;
  }, [tripCode]);

  const saveSummary = useCallback(async (dayId, text) => {
    if (!tripCode) return;
    setSyncStatus(s => ({...s, [dayId]: 'saving'}));
    if (FB_READY) {
      await db.collection('vietnam_trips').doc(tripCode).collection('data').doc(`day${dayId}`).set({summary: text, updatedAt: new Date().toISOString()}, {merge: true});
    } else {
      const cached = JSON.parse(localStorage.getItem('vn_summaries') || '{}');
      cached[dayId] = text;
      localStorage.setItem('vn_summaries', JSON.stringify(cached));
    }
    setSyncStatus(s => ({...s, [dayId]: 'ok'}));
    setTimeout(() => setSyncStatus(s => ({...s, [dayId]: null})), 2000);
  }, [tripCode]);

  const localSummaries = JSON.parse(localStorage.getItem('vn_summaries') || '{}');
  const merged = {};
  DAYS.forEach(d => {
    merged[d.n] = summaries[`day${d.n}`]?.summary || localSummaries[d.n] || '';
  });

  return { summaries: merged, saveSummary, syncStatus };
}

// PHOTO HOOK — compress + Firestore sync
// ═══════════════════════════════════════════════
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        let {width: w, height: h} = img;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function usePhotos(tripCode, dayN) {
  const [photos, setPhotos] = useState([]);
  const [uploading, setUploading] = useState(false);

  useEffect(() => {
    if (!FB_READY || !tripCode) return;
    const ref = db.collection('vietnam_trips').doc(tripCode)
      .collection('photos').where('dayN', '==', dayN);
    const unsub = ref.onSnapshot(
      snap => {
        const arr = snap.docs.map(d => ({id: d.id, ...d.data()}));
        arr.sort((a, b) => (a.uploadedAt || '').localeCompare(b.uploadedAt || ''));
        setPhotos(arr);
      },
      err => console.error('Photos sync error:', err.code, err.message)
    );
    return unsub;
  }, [tripCode, dayN]);

  const addPhoto = useCallback(async (base64url) => {
    if (FB_READY && tripCode) {
      await db.collection('vietnam_trips').doc(tripCode)
        .collection('photos').add({dayN, url: base64url, uploadedAt: new Date().toISOString()});
    } else {
      setPhotos(p => [...p, {id: Date.now().toString(), url: base64url}]);
    }
  }, [tripCode, dayN]);

  const deletePhoto = useCallback(async (id) => {
    if (FB_READY && tripCode) {
      await db.collection('vietnam_trips').doc(tripCode)
        .collection('photos').doc(id).delete();
    } else {
      setPhotos(p => p.filter(ph => ph.id !== id));
    }
  }, [tripCode, dayN]);

  return {photos, addPhoto, deletePhoto, uploading, setUploading};
}

// SCHEDULE HOOK — per-day editable schedule
// ═══════════════════════════════════════════════
function useSchedule(tripCode, dayN, baseSchedule) {
  const [items, setItems] = useState(null); // null = no custom, use base
  const [schedStatus, setSchedStatus] = useState(null);
  const saveTimer = useRef(null);

  useEffect(() => {
    if (!FB_READY || !tripCode) {
      const c = localStorage.getItem(`vn_sched_${tripCode}_d${dayN}`);
      setItems(c ? JSON.parse(c) : null);
      return;
    }
    const ref = db.collection('vietnam_trips').doc(tripCode).collection('schedules').doc(`day${dayN}`);
    const unsub = ref.onSnapshot(
      snap => setItems(snap.exists ? (snap.data().items || []) : null),
      err => console.error('Schedule error:', err.code)
    );
    return unsub;
  }, [tripCode, dayN]);

  const saveItems = useCallback((newItems) => {
    clearTimeout(saveTimer.current);
    setSchedStatus('saving');
    saveTimer.current = setTimeout(async () => {
      try {
        if (FB_READY && tripCode) {
          await db.collection('vietnam_trips').doc(tripCode).collection('schedules')
            .doc(`day${dayN}`).set({items: newItems, updatedAt: new Date().toISOString()});
        } else {
          localStorage.setItem(`vn_sched_${tripCode}_d${dayN}`, JSON.stringify(newItems));
        }
        setSchedStatus('ok');
        setTimeout(() => setSchedStatus(null), 2000);
      } catch(e) { console.error(e); setSchedStatus(null); }
    }, 700);
  }, [tripCode, dayN]);

  const initFromBase = useCallback(() => {
    if (items === null) {
      const copy = baseSchedule.map(s => ({...s}));
      setItems(copy);
      saveItems(copy);
    }
  }, [items, baseSchedule, saveItems]);

  return {
    schedItems: items ?? baseSchedule,
    hasCustom: items !== null,
    setSchedItems: setItems,
    saveItems,
    initFromBase,
    schedStatus,
  };
}

// ═══════════════════════════════════════════════
// WEATHER HOOK — Open-Meteo Archive API (free)
// ═══════════════════════════════════════════════
function useWeather() {
  const [weatherData, setWeatherData] = useState(() => {
    try { return JSON.parse(localStorage.getItem('vn_weather') || '{}'); } catch { return {}; }
  });
  const [loading, setLoading] = useState({});
  const fetchedRef = useRef({});

  // Clear stale weather cache if year changed
  useEffect(() => {
    if (localStorage.getItem('vn_weather_year') !== '2026') {
      localStorage.removeItem('vn_weather');
      localStorage.setItem('vn_weather_year', '2026');
      setWeatherData({});
      fetchedRef.current = {};
    }
  }, []);

  // Mark already-cached regions so we don't re-fetch
  const initDone = useRef(false);
  if (!initDone.current) {
    initDone.current = true;
    Object.keys(weatherData).forEach(r => { fetchedRef.current[r] = true; });
  }

  const fetchRegionWeather = useCallback(async (region) => {
    if (fetchedRef.current[region]) return;
    fetchedRef.current[region] = true;
    const coords = REGION_COORDS[region];
    if (!coords) return;
    setLoading(l => ({...l, [region]: true}));
    try {
      // Use archive API — trip dates are in the past (July 2025)
      const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${coords.lat}&longitude=${coords.lon}&start_date=2026-07-15&end_date=2026-07-31&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max&timezone=Asia%2FBangkok`;
      const res = await fetch(url);
      const json = await res.json();
      const d = json.daily;
      const rw = {};
      d.time.forEach((date, i) => {
        const n = Math.floor((new Date(date) - new Date('2026-07-15')) / 86400000) + 1;
        if (n >= 1 && n <= 17) {
          rw[n] = {
            wcode: d.weather_code[i],
            tmax: Math.round(d.temperature_2m_max[i]),
            tmin: Math.round(d.temperature_2m_min[i]),
            precip: Math.round(d.precipitation_sum[i] * 10) / 10,
            wind: Math.round(d.windspeed_10m_max[i]),
          };
        }
      });
      setWeatherData(prev => {
        const updated = {...prev, [region]: rw};
        localStorage.setItem('vn_weather', JSON.stringify(updated));
        return updated;
      });
    } catch(e) {
      console.warn('Weather fetch failed:', region, e.message);
      fetchedRef.current[region] = false; // allow retry
    } finally {
      setLoading(l => ({...l, [region]: false}));
    }
  }, []);

  const getWeatherForDay = (dayN, region) => weatherData[region]?.[dayN] || null;

  return { fetchRegionWeather, getWeatherForDay, weatherLoading: loading };
}

// AUTO CURRENCY RATES HOOK
// ═══════════════════════════════════════════════
const RATES_CACHE_KEY = 'vn_rates_cache';
function useCurrencyRates() {
  const [rates, setRates] = useState(() => {
    try {
      const c = JSON.parse(localStorage.getItem(RATES_CACHE_KEY) || 'null');
      if (c && Date.now() - c.ts < 86400000) return c;
    } catch {}
    return {vndPerUsd:25000, ilsPerUsd:3.7, ts:null};
  });
  useEffect(() => {
    try {
      const c = JSON.parse(localStorage.getItem(RATES_CACHE_KEY) || 'null');
      if (c && Date.now() - c.ts < 86400000) return;
    } catch {}
    fetch('https://api.frankfurter.app/latest?from=USD&to=ILS,VND')
      .then(r => r.json())
      .then(j => {
        const updated = {vndPerUsd: Math.round(j.rates.VND), ilsPerUsd: j.rates.ILS, ts: Date.now()};
        localStorage.setItem(RATES_CACHE_KEY, JSON.stringify(updated));
        setRates(updated);
      })
      .catch(e => console.warn('Rates fetch failed:', e.message));
  }, []);
  return rates;
}

// CURRENCY VIEW
// ═══════════════════════════════════════════════
function CurrencyView() {
  const autoRates = useCurrencyRates();
  const [manualRates, setManualRates] = useState(null);
  const rates = manualRates || autoRates;
  const [draftRates, setDraftRates] = useState(null);
  const [editRates, setEditRates] = useState(false);
  const [ils, setIls] = useState('');
  const [usd, setUsd] = useState('');
  const [vnd, setVnd] = useState('');

  const convert = (from, val) => {
    const n = parseFloat(val);
    if (isNaN(n)) { setIls(''); setUsd(''); setVnd(''); return; }
    if (from === 'ils') {
      const u = n / rates.ilsPerUsd;
      setUsd(u.toFixed(2)); setVnd((u * rates.vndPerUsd).toFixed(0));
    } else if (from === 'usd') {
      const i = n * rates.ilsPerUsd;
      setIls(i.toFixed(2)); setVnd((n * rates.vndPerUsd).toFixed(0));
    } else {
      const u = n / rates.vndPerUsd;
      setIls((u * rates.ilsPerUsd).toFixed(2)); setUsd(u.toFixed(3));
    }
  };

  const fmtVnd = (n) => {
    const num = parseInt(n);
    if (isNaN(num)) return '—';
    return num.toLocaleString('he-IL') + ' ₫';
  };

  return (
    <div className="screen">
      <div className="curr-header">
        <h1>💱 מחשבון מטבע</h1>
        <p style={{fontSize:'.82rem',opacity:.85,marginTop:'4px'}}>שקל / דולר / דונג ויטנאמי</p>
      </div>
      <div className="curr-body">
        <div className="curr-card">
          {[
            {label:'₪ שקל',key:'ils',val:ils,set:v=>{setIls(v);convert('ils',v)}},
            {label:'$ דולר',key:'usd',val:usd,set:v=>{setUsd(v);convert('usd',v)}},
            {label:'₫ דונג',key:'vnd',val:vnd,set:v=>{setVnd(v);convert('vnd',v)}},
          ].map(({label,key,val,set}) => (
            <div key={key} className="curr-row">
              <span className="curr-label" style={{fontSize:'.75rem',fontWeight:700}}>{label}</span>
              <input className="curr-input" type="number" value={val} onChange={e=>set(e.target.value)} placeholder="0" />
            </div>
          ))}
        </div>

        <div className="curr-card">
          <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:'10px',color:'#1a202c'}}>📊 המרה מהירה — כמה זה ב-₫?</div>
          {[
            {label:'כוס קפה (25,000₫)',usd:1,ils:3.7},
            {label:'ארוחת רחוב (50,000₫)',usd:2,ils:7.4},
            {label:'מסעדה בינונית (150,000₫)',usd:6,ils:22.2},
            {label:'טקסי קצר (100,000₫)',usd:4,ils:14.8},
            {label:'בקבוק בירה (30,000₫)',usd:1.2,ils:4.4},
          ].map((r,i) => (
            <div key={i} className="curr-result-row">
              <span className="curr-res-label">{r.label}</span>
              <span className="curr-res-val">≈ ₪{r.ils}</span>
            </div>
          ))}
        </div>

        {editRates ? (
          <div className="curr-card">
            <div style={{fontWeight:700,marginBottom:'10px'}}>עדכון שערים ידני</div>
            <div className="curr-row">
              <span className="curr-label" style={{fontSize:'.72rem'}}>VND/$</span>
              <input className="curr-input" type="number" value={draftRates?.vndPerUsd ?? rates.vndPerUsd} onChange={e=>setDraftRates(r=>({...(r||rates),vndPerUsd:+e.target.value}))} />
            </div>
            <div className="curr-row">
              <span className="curr-label" style={{fontSize:'.72rem'}}>₪/$</span>
              <input className="curr-input" type="number" value={draftRates?.ilsPerUsd ?? rates.ilsPerUsd} onChange={e=>setDraftRates(r=>({...(r||rates),ilsPerUsd:+e.target.value}))} />
            </div>
            <button onClick={()=>{ if(draftRates) setManualRates({...draftRates, ts:Date.now()}); setEditRates(false); setDraftRates(null); }} style={{width:'100%',marginTop:'8px',padding:'10px',borderRadius:10,border:'none',background:'#2B6CB0',color:'#fff',fontFamily:'inherit',fontWeight:700,cursor:'pointer'}}>שמור שערים</button>
          </div>
        ) : (
          <div className="rate-info">
            שערים: 1$ = {rates.vndPerUsd.toLocaleString()}₫ = ₪{rates.ilsPerUsd}
            {rates.ts && <div style={{fontSize:'.72rem',color:'#a0aec0',marginTop:3}}>עודכן: {new Date(rates.ts).toLocaleDateString('he-IL')}{manualRates ? ' (ידני)' : ' (אוטומטי)'}</div>}
            <br/>
            <button className="rate-edit" onClick={()=>{ setDraftRates(null); setEditRates(true); }}>✏️ עדכן שערים</button>
            {manualRates && <button className="rate-edit" style={{marginRight:6}} onClick={()=>setManualRates(null)}>↺ אוטומטי</button>}
          </div>
        )}
      </div>
    </div>
  );
}

// BOTTOM NAV
// ═══════════════════════════════════════════════
const NAV_ITEMS = [
  {id:'cal', icon:'📅', label:'ימים'},
  {id:'phrases', icon:'🗣️', label:'ויטנאמית'},
  {id:'currency', icon:'💱', label:'מטבע'},
  {id:'contacts', icon:'📞', label:'אנשי קשר'},
  {id:'info', icon:'📖', label:'מידע'},
];

function BottomNav({view, onNav}) {
  return (
    <nav className="nav">
      {NAV_ITEMS.map(item => (
        <button key={item.id} className={`nav-btn${view===item.id?' active':''}`}
          onClick={() => onNav(item.id)}
          style={view===item.id?{'--primary': '#1B6B5E'}:{}}>
          <span className="icon">{item.icon}</span>
          {item.label}
        </button>
      ))}
    </nav>
  );
}

// ═══════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════
function App() {
  const [tripCode, setTripCode] = useState(() => localStorage.getItem('vn_trip_code') || '');
  const [view, setView] = useState('cal');
  const [dayN, setDayN] = useState(null);
  const [fbStatus, setFbStatus] = useState('checking'); // 'checking' | 'ok' | 'error'
  const { summaries, saveSummary, syncStatus } = useSyncedData(tripCode);
  const { fetchRegionWeather, getWeatherForDay, weatherLoading } = useWeather();

  // Test actual Firestore connectivity on mount
  useEffect(() => {
    if (!FB_READY) { setFbStatus('error'); return; }
    db.collection('_ping').doc('test').set({t: Date.now()})
      .then(() => setFbStatus('ok'))
      .catch(e => { console.error('Firestore error:', e); setFbStatus('error'); });
  }, []);

  const handleReset = () => {
    if (!window.confirm('לנתק ולחזור למסך הכניסה?')) return;
    localStorage.removeItem('vn_trip_code');
    setTripCode('');
  };

  if (!tripCode) {
    return <SetupScreen onReady={(code) => {
      localStorage.setItem('vn_trip_code', code);
      setTripCode(code);
    }} />;
  }

  const handleDaySelect = (n) => {
    setDayN(n);
    setView('day');
  };

  const handleNav = (v) => {
    setView(v);
    setDayN(null);
  };

  const handleBack = (nextDayN) => {
    if (typeof nextDayN === 'number') {
      setDayN(nextDayN);
    } else {
      setView('cal');
      setDayN(null);
    }
  };

  return (
    <div className="app">
      {view === 'cal' && <CalendarView onDaySelect={handleDaySelect} fbStatus={fbStatus} onReset={handleReset} tripCode={tripCode} />}
      {view === 'day' && dayN && <DayView dayN={dayN} onBack={handleBack} tripCode={tripCode} summaries={summaries} saveSummary={saveSummary} syncStatus={syncStatus} getWeatherForDay={getWeatherForDay} fetchRegionWeather={fetchRegionWeather} weatherLoading={weatherLoading} />}
      {view === 'phrases' && <PhrasesView />}
      {view === 'currency' && <CurrencyView />}
      {view === 'contacts' && <ContactsView />}
      {view === 'info' && <InfoView />}
      {view !== 'day' && <BottomNav view={view} onNav={handleNav} />}
      {view === 'day' && (
        <nav className="nav" style={{borderTop:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.95)'}}>
          <button className="nav-btn" onClick={() => setView('cal')} style={{flex:'none',padding:'0 20px'}}>← חזרה</button>
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',fontWeight:700,color:'#4a5568'}}>יום {dayN} — {DAYS[dayN-1]?.title}</div>
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
